apiVersion: apps/v1
kind: Deployment
metadata:
  name: blood-fit-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blood-fit
  template:
    metadata:
      labels:
        app: blood-fit
    spec:
      containers:
      - name: frontend
        image: infhari/blood-fit:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: blood-fit-service
spec:
  type: NodePort
  selector:
    app: blood-fit
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
