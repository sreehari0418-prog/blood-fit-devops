name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          infhari/blood-fit:latest
          infhari/blood-fit:${{ github.sha }}

    - name: Update Kubernetes Manifest
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        sed -i "s|image: infhari/blood-fit:.*|image: infhari/blood-fit:${{ github.sha }}|" k8s/manifests.yaml
        git add k8s/manifests.yaml
        git commit -m "chore: update image tag to ${{ github.sha }} [skip ci]"
        git push
